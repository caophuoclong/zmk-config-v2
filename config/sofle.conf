
# ── Encoders ──────────────────────────────────────────────────
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ── Custom OLED Display (zmk-nice-oled module) ──────────────
# The nice_view_gem shield provides its own custom status screen.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_WPM=y

# ── Debounce ─────────────────────────────────────────────────
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=2
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=2

# ── Combos ───────────────────────────────────────────────────
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=20

# ── RGB Underglow (WS2812) ───────────────────────────────────
# Enable these only when your board/shield DTS provides `zmk,underglow`.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=270
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y     # off when idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n      # keep on when plugged in

# ── Power & Sleep ────────────────────────────────────────────
CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_EXT_POWER=y

# ── Bluetooth ────────────────────────────────────────────────
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ── ZMK Studio ───────────────────────────────────────────────
CONFIG_ZMK_STUDIO=y